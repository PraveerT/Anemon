# N1 (raw depth) + Bilateral RD (T-RD + N-RD streams, sum-fused)
# Goal: beat RD(N1) 90.46 via novel spatial-delta scan axis.

dataloader: nvidia_dataloader.NvidiaLoader
phase: train
num_epoch: 120
work_dir: ./work_dir/pmamba_baseline_bilateralrd/
batch_size: 8
test_batch_size: 1
num_worker: 8
device: 0
log_interval: 50
eval_interval: 1
save_interval: 5

framesize: 32
pts_size: 96
dynamic_pts_size: true
strict_load: false
weights: null

optimizer_args:
  optimizer: Adam
  base_lr: 0.00012
  step: [100, 160, 180]
  weight_decay: 0.03
  start_epoch: 0
  nesterov: false

train_loader_args: {phase: train, framerate: 32}
test_loader_args:  {phase: test,  framerate: 32}

model: models.motion_bilateralrd.MotionBilateralRD
model_args:
  pts_size: 96
  num_classes: 25
  knn: [32, 24, 48, 24]
  topk: 8
  multi_scale_num_scales: 5
  brd_hidden_dim: 128
  brd_num_layers: 2
  brd_num_heads: 4
  brd_n_q: 4
  brd_n_v: 8
  brd_dropout: 0.3
  brd_t_bidirectional: true
  brd_fuse: sum
