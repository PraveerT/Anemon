# CN-XXL + Encoder/Decoder for correspondence emergence.
# Random per-frame points -> latent -> canonical ordered K-point cloud
# -> CN-XXL spatial pipeline. Aux losses (chamfer + temporal smoothness)
# force canonical output index k to track the same anatomical point
# across frames.

dataloader: nvidia_dataloader.NvidiaLoader
phase: train
num_epoch: 100
work_dir: ./work_dir/cn_xxl_ae/
batch_size: 8
test_batch_size: 8
num_worker: 8
device: 0
log_interval: 50
eval_interval: 1
save_interval: 5

framesize: 32
pts_size: 172
dynamic_pts_size: true
strict_load: false
weights: null

optimizer_args:
  scheduler: constant_then_cosine
  cosine_start: 75
  num_epochs: 100
  optimizer: Adam
  base_lr: 0.00012
  step: [60, 70, 75]
  weight_decay: 0.03
  start_epoch: 0
  nesterov: false

train_loader_args: {phase: train, framerate: 32}
test_loader_args:  {phase: test,  framerate: 32}

model: models.motion_cleanest_ae.MotionCleanestLinXLAE
model_args:
  pts_size: 172
  num_classes: 25
  knn: [32, 24, 48, 24]
  topk: 8
  multi_scale_num_scales: 5
  # CN-XXL encoder hyperparams (same as 91.08 winner)
  lxl_hidden_dim: 256
  lxl_mlp_dim: 512
  lxl_num_layers: 4
  lxl_dropout: 0.3
  lxl_bidirectional: true
  lxl_residual_scale: 0.7
  # AE-specific
  ae_latent_dim: 128
  ae_K: 128                    # canonical point count = full input count
  ae_decoder_hidden: 256
  chamfer_weight: 0.05         # reconstruction weight
  temporal_weight: 0.5         # temporal smoothness -> correspondence
  ae_warmstart: ./work_dir/ae_pretrain/ae_pretrain.pt   # self-supervised pretrain
  # Quat-head (decorative aux from 91.08 winner)
  quat_head_hidden: 128
  quat_head_scale: 0.3
