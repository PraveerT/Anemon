# N1 (raw depth) input + DeltaProduct (H=2 Householder reflections per timestep)

dataloader: nvidia_dataloader.NvidiaLoader
phase: train
num_epoch: 120
work_dir: ./work_dir/pmamba_baseline_deltaproduct/
batch_size: 8
test_batch_size: 1
num_worker: 8
device: 0
log_interval: 50
eval_interval: 1
save_interval: 5

framesize: 32
pts_size: 96
dynamic_pts_size: true
strict_load: false
weights: null

optimizer_args:
  optimizer: Adam
  base_lr: 0.00012
  step: [100, 160, 180]
  weight_decay: 0.03
  start_epoch: 0
  nesterov: false

train_loader_args: {phase: train, framerate: 32}
test_loader_args:  {phase: test,  framerate: 32}

model: models.motion_deltaproduct.MotionDeltaProduct
model_args:
  pts_size: 96
  num_classes: 25
  knn: [32, 24, 48, 24]
  topk: 8
  multi_scale_num_scales: 5
  dp_hidden_dim: 256
  dp_num_layers: 2
  dp_num_heads: 4
  dp_head_dim: 64
  dp_expand_v: 2
  dp_num_householder: 2
  dp_dropout: 0.3
  dp_bidirectional: true
