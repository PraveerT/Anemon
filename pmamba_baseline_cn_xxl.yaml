# CN-XXL: wider per-frame MLP encoder, deeper + wider than CN-XL.
# Tests whether further increasing encoder params past CN-XL gets us
# beyond RD's ~88-90% solo accuracy.

dataloader: nvidia_dataloader.NvidiaLoader
phase: train
num_epoch: 120
work_dir: ./work_dir/pmamba_baseline_cn_xxl/
batch_size: 8
test_batch_size: 1
num_worker: 8
device: 0
log_interval: 50
eval_interval: 1
save_interval: 5

framesize: 32
pts_size: 96
dynamic_pts_size: true
strict_load: false
weights: null

optimizer_args:
  optimizer: Adam
  base_lr: 0.00012
  step: [100, 160, 180]
  weight_decay: 0.03
  start_epoch: 0
  nesterov: false

train_loader_args: {phase: train, framerate: 32}
test_loader_args:  {phase: test,  framerate: 32}

model: models.motion_cleanest.MotionCleanestLinXL
model_args:
  pts_size: 96
  num_classes: 25
  knn: [32, 24, 48, 24]
  topk: 8
  multi_scale_num_scales: 5
  # Encoder hyperparams: wider AND deeper than CN-XL
  lxl_hidden_dim: 256          # 128 -> 256 (2x wider state)
  lxl_mlp_dim: 512             # 256 -> 512 (2x wider MLP)
  lxl_num_layers: 4            # 2 -> 4 (2x deeper per direction)
  lxl_dropout: 0.3
  lxl_bidirectional: true
  lxl_residual_scale: 0.7
