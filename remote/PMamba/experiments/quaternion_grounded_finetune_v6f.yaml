# Exp 6f: Finetune from 80.29% checkpoint with grounded_cycle aux loss
# Validates that grounded_cycle is the active ingredient that produced 80.29%
# (the previous baseline). If this maintains/exceeds 80.29% while pure-finetune
# (Exp 3-control) lands at 78.42%, the loss IS the active ingredient.
dataloader: nvidia_dataloader.NvidiaQuaternionQCCParityLoader
phase: train
num_epoch: 40
work_dir: ./work_dir/quaternion_grounded_finetune_v6f/
batch_size: 8
test_batch_size: 1
num_worker: 8
device: 0
log_interval: 50
eval_interval: 1
save_interval: 5
framesize: 32
pts_size: 256
dynamic_pts_size: false
weights: ./work_dir/quaternion_branch/epoch112_model.pt
strict_load: false
optimizer_args:
  optimizer: Adam
  base_lr: 0.0001
  step:
  - 25
  - 32
  - 36
  weight_decay: 0.01
  start_epoch: 0
  nesterov: false
train_loader_args:
  phase: train
  framerate: 32
  return_correspondence: false
test_loader_args:
  phase: test
  framerate: 32
  return_correspondence: false
model: models.reqnn_motion.BearingQCCFeatureMotion
model_args:
  pts_size: 256
  num_classes: 25
  hidden_dims:
  - 64
  - 256
  dropout: 0.05
  edgeconv_k: 20
  merge_eps: 1.0e-06
  so3_weight: 0.0
  rotation_sigma: 0.3
  bearing_knn_k: 10
  qcc_weight: 0.1
  qcc_variant: grounded_cycle
