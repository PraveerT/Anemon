# Exp 10a: Grounded displacement loss, from scratch
#
# Compact name: Sc_Nc_gd01_pts48-256_e140
# Family: Sc_Nc_gd01_pts48-256_e140
#
# Per-point MLP predicts (dx,dy,dz) displacement from encoded features.
# Loss = MSE vs actual xyz_{t+1} - xyz_t.  Geometry-grounded, per-point,
# no correspondence needed, no segment pooling.

dataloader: nvidia_dataloader.NvidiaQuaternionQCCParityLoader

phase: train
num_epoch: 140
work_dir: ./work_dir/quaternion_gd_v10a/
batch_size: 8
test_batch_size: 1
num_worker: 8

device: 0
log_interval: 50
eval_interval: 1
save_interval: 1

framesize: 32
pts_size: 96
dynamic_pts_size: true

strict_load: false

optimizer_args:
  optimizer: Adam
  base_lr: 0.0005
  step:
  - 100
  - 120
  - 130
  weight_decay: 0.01
  start_epoch: 0
  nesterov: false

train_loader_args:
  phase: train
  framerate: 32
  return_correspondence: false

test_loader_args:
  phase: test
  framerate: 32
  return_correspondence: false

model: models.reqnn_motion.BearingQCCFeatureMotion
model_args:
  pts_size: 96
  num_classes: 25
  hidden_dims:
  - 64
  - 256
  dropout: 0.05
  edgeconv_k: 20
  merge_eps: 1.0e-06
  so3_weight: 0.0
  rotation_sigma: 0.3
  bearing_knn_k: 10
  qcc_weight: 0.1
  qcc_variant: grounded_disp
