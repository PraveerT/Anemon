# Exp 12b: TRUE per-point bearing rotation QCC, warm-restart from v8a
#
# Compact name: P[P[Sc_Co_none_pts48-256_e140]E125_Co_none_pts48-256_e140]E140_Nc_qr01_pts256_e140
# Family: Sc_Co_none_pts48-256_e140 (same chain as v8a, depth 2)
#
# This is the LITERAL quaternion cross-correlation we never tried: predict
# per-point bearing rotation quaternion (rotation taking bearing_t to
# bearing_t+1) from encoded features. Loss = geodesic 1 - (q_pred . q_gt)^2.
#
# Hypothesis: directional motion signal (perfect for classes 1,5,24 that
# confuse on direction/finger-count) provides complementary info that
# pure classification cannot extract.
#
# Chain: v6q (scratch) -> v8a (no-aux restart, 80.08%) -> v12b (qr polish)

dataloader: nvidia_dataloader.NvidiaQuaternionQCCParityLoader
phase: train
num_epoch: 140
work_dir: ./work_dir/quaternion_qrot_warmrestart_v12b/
batch_size: 8
test_batch_size: 1
num_worker: 8
device: 0
log_interval: 50
eval_interval: 1
save_interval: 1
framesize: 32
pts_size: 256
dynamic_pts_size: false
weights: ./work_dir/quaternion_noaux_warmrestart_v8a/epoch140_model.pt
strict_load: false
optimizer_args:
  optimizer: Adam
  base_lr: 0.0005
  step: [100, 120, 130]
  weight_decay: 0.01
  start_epoch: 0
  nesterov: false
train_loader_args:
  phase: train
  framerate: 32
  return_correspondence: false
test_loader_args:
  phase: test
  framerate: 32
  return_correspondence: false
model: models.reqnn_motion.BearingQCCFeatureMotion
model_args:
  pts_size: 256
  num_classes: 25
  hidden_dims: [64, 256]
  dropout: 0.05
  edgeconv_k: 20
  merge_eps: 1.0e-06
  so3_weight: 0.0
  rotation_sigma: 0.3
  bearing_knn_k: 10
  qcc_weight: 0.1
  qcc_variant: bearing_rot
