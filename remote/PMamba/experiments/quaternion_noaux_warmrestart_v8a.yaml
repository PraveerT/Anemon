# Exp 8a: No-aux warm-restart from v6q (the definitive QCC test)
#
# Compact name: P[Sc_Co_none_pts48-256_e140]E125_Co_none_pts48-256_e140
# Family: Sc_Co_none_pts48-256_e140
#
# If depth-1 no-aux hits ~79% (like v6r with pr01) -> warm-restart alone,
# aux irrelevant. If stays ~76% -> aux IS helping at depth 1+.

dataloader: nvidia_dataloader.NvidiaQuaternionQCCParityLoader

phase: train
num_epoch: 140
work_dir: ./work_dir/quaternion_noaux_warmrestart_v8a/
batch_size: 8
test_batch_size: 1
num_worker: 8

device: 0
log_interval: 50
eval_interval: 1
save_interval: 1

framesize: 32
pts_size: 96
dynamic_pts_size: true

weights: ./work_dir/quaternion_prediction_off_scratch_v6q/epoch125_model.pt
strict_load: false

optimizer_args:
  optimizer: Adam
  base_lr: 0.0005
  step:
  - 100
  - 120
  - 130
  weight_decay: 0.01
  start_epoch: 0
  nesterov: false

train_loader_args:
  phase: train
  framerate: 32
  return_correspondence: true

test_loader_args:
  phase: test
  framerate: 32
  return_correspondence: true

model: models.reqnn_motion.BearingQCCFeatureMotion
model_args:
  pts_size: 96
  num_classes: 25
  hidden_dims:
  - 64
  - 256
  dropout: 0.05
  edgeconv_k: 20
  merge_eps: 1.0e-06
  so3_weight: 0.0
  rotation_sigma: 0.3
  bearing_knn_k: 10
  qcc_weight: 0.0
  qcc_variant: prediction
