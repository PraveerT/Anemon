# TUNEDv3: only capacity tweaks, revert all regularization-driven changes.
# Diff vs baseline: topk 8→6, mamba_output_dim 256→384.
# Same as baseline: knn, downsample [2,2,2], mamba_hidden_dim 128, layers 2, ms unchanged.

dataloader: nvidia_dataloader.NvidiaLoader

phase: train
num_epoch: 120
work_dir: ./work_dir/pmamba_tunedv3_e120/
batch_size: 8
test_batch_size: 1
num_worker: 8

device: 0
log_interval: 50
eval_interval: 1
save_interval: 5

framesize: 32
pts_size: 96
dynamic_pts_size: false
strict_load: false

optimizer_args:
  optimizer: Adam
  base_lr: 0.00012
  step:
  - 100
  weight_decay: 0.03
  start_epoch: 0
  nesterov: false

train_loader_args:
  phase: train
  framerate: 32

test_loader_args:
  phase: test
  framerate: 32

model: models.motion.Motion
model_args:
  pts_size: 96
  num_classes: 25
  knn:
  - 32
  - 24
  - 48
  - 24
  topk: 6
  downsample:
  - 2
  - 2
  - 2
  mamba_hidden_dim: 128
  mamba_num_layers: 2
  mamba_output_dim: 384
  ms_num_scales: 4
  ms_feature_dim: 32
