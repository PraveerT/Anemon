# PMamba + centroid-radial tops input. Finetune from PMamba best (ep110, 89.83%).
# Recipe per user spec: start_epoch 80, base_lr 0.00012, num_epoch 100 (20 ep).
# strict_load: false because stage1 input changes 4ch -> 7ch (reinit stage1).

dataloader: nvidia_dataloader.NvidiaLoader

phase: train
num_epoch: 140
work_dir: ./work_dir/pmamba_tops/
batch_size: 8
test_batch_size: 1
num_worker: 8

device: 0
log_interval: 50
eval_interval: 1
save_interval: 5

framesize: 32
pts_size: 256
dynamic_pts_size: false
strict_load: false
weights: ./work_dir/pmamba_tops/epoch110_model.pt

optimizer_args:
  optimizer: Adam
  base_lr: 0.000012
  step:
  - 999
  weight_decay: 0.03
  start_epoch: 110
  nesterov: false

train_loader_args:
  phase: train
  framerate: 32

test_loader_args:
  phase: test
  framerate: 32

model: models.motion.MotionTops
model_args:
  num_classes: 25
  pts_size: 256
  knn: [32, 24, 48, 24]
  topk: 8
