# Exp 3: Finetune from 80.29% checkpoint with contrastive loss
# Start from the best model and push further
dataloader: nvidia_dataloader.NvidiaQuaternionQCCParityLoader
phase: train
num_epoch: 60
work_dir: ./work_dir/quaternion_finetune_best_v6c/
batch_size: 8
test_batch_size: 1
num_worker: 8
device: 0
log_interval: 50
eval_interval: 1
save_interval: 5
framesize: 32
pts_size: 256
dynamic_pts_size: false
weights: ./work_dir/quaternion_branch/epoch112_model.pt
strict_load: false
optimizer_args:
  optimizer: Adam
  base_lr: 0.0001
  step:
  - 40
  - 50
  - 55
  weight_decay: 0.01
  start_epoch: 0
  nesterov: false
train_loader_args:
  phase: train
  framerate: 32
  return_correspondence: true
test_loader_args:
  phase: test
  framerate: 32
  return_correspondence: true
model: models.reqnn_motion.BearingQCCFeatureMotion
model_args:
  pts_size: 256
  num_classes: 25
  hidden_dims:
  - 64
  - 256
  dropout: 0.05
  edgeconv_k: 20
  merge_eps: 1.0e-06
  so3_weight: 0.0
  rotation_sigma: 0.3
  bearing_knn_k: 10
  qcc_weight: 0.3
  qcc_variant: contrastive
  decouple_sampling: true
