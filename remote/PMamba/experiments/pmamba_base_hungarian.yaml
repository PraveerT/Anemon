# Resume pmamba_base from ep110 with Hungarian correspondence sampling, fixed pts=256.
# Vanilla Motion (4-ch xyz+t). Hungarian = denser correspondence-aligned sampling
# vs random sampling that base was trained on. Acts as input-distribution perturbation.

dataloader: nvidia_dataloader.NvidiaQuaternionQCCParityLoader

phase: train
num_epoch: 200
work_dir: ./work_dir/pmamba_base_hungarian/
batch_size: 8
test_batch_size: 1
num_worker: 8

device: 0
log_interval: 50
eval_interval: 1
save_interval: 1

framesize: 32
pts_size: 256
dynamic_pts_size: false
strict_load: false
weights: ./work_dir/pmamba_branch/epoch110_model.pt

optimizer_args:
  optimizer: Adam
  base_lr: 0.000012
  step:
  - 40
  - 60
  weight_decay: 0.03
  start_epoch: 110
  nesterov: false

train_loader_args:
  phase: train
  framerate: 32
  return_correspondence: true
  assignment_mode: hungarian

test_loader_args:
  phase: test
  framerate: 32
  return_correspondence: true
  assignment_mode: hungarian

model: models.motion.Motion
model_args:
  num_classes: 25
  pts_size: 256
  knn: [32, 24, 48, 24]
  topk: 8
