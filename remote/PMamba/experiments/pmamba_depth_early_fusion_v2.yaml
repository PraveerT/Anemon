# Early fusion v2: PMamba (e110) + v9c β=2.0 best, joint MLP classifier.
# Start at epoch 100 so main.py's dynamic pts_size logic locks to 256 from
# the first step. lr = 0.000012 (PMamba's post-step lr) so backbones drift
# minimally while the fresh fusion head learns.

dataloader: nvidia_multi_loader.NvidiaMultiLoader

phase: train
num_epoch: 140
work_dir: ./work_dir/pmamba_depth_early_fusion_v2/
batch_size: 8
test_batch_size: 1
num_worker: 8

device: 0
log_interval: 50
eval_interval: 1
save_interval: 5

framesize: 32
pts_size: 96
dynamic_pts_size: true
strict_load: false

optimizer_args:
  optimizer: Adam
  base_lr: 0.000012
  step:
  - 125
  - 135
  weight_decay: 0.0001
  start_epoch: 100
  nesterov: false

train_loader_args:
  phase: train
  framerate: 32
  img_size: 112
  use_tops: true
  use_rigidity: true
  rigidity_per_point: false
  rigidity_norm_scale: 1.0

test_loader_args:
  phase: test
  framerate: 32
  img_size: 112
  use_tops: true
  use_rigidity: true
  rigidity_per_point: false
  rigidity_norm_scale: 1.0

model: models.motion.PMambaDepthEarlyFusion
model_args:
  num_classes: 25
  pts_size: 256
  knn: [32, 24, 48, 24]
  topk: 8
  depth_in_channels: 4
  depth_feat_dim: 256
  depth_lstm_hidden: 256
  depth_lstm_layers: 2
  depth_bidir: true
  depth_dropout: 0.3
  clip_reweight_beta: 2.0
  pmamba_weights: ./work_dir/pmamba_branch/epoch110_model.pt
  depth_weights: ./work_dir/depth_branch/v9_clean_b2_0/best_model.pt
  freeze_pmamba: false
  freeze_depth: false
  pmamba_feat_dim: 1024
  fusion_hidden: 512
  fusion_dropout: 0.3
