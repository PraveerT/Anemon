# ST-QNet: PMamba Motion (with quaternion cycle consistency) from scratch.
# Uses paper's motion.py replacement. Recipe matches baseline pmamba_branch
# (Adam, lr 0.00012, step at 100, 120 ep) plus quaternion_cycle_weight=0.8
# per paper Section 4.5.

dataloader: nvidia_dataloader.NvidiaLoader

phase: train
num_epoch: 120
work_dir: ./work_dir/pmamba_stqnet_e120/
batch_size: 8
test_batch_size: 1
num_worker: 8

device: 0
log_interval: 50
eval_interval: 1
save_interval: 5

framesize: 32
pts_size: 96
dynamic_pts_size: true
strict_load: false

quaternion_cycle_weight: 0.8
quaternion_lambda_unit: 0.1

optimizer_args:
  optimizer: Adam
  base_lr: 0.00012
  step:
  - 100
  weight_decay: 0.03
  start_epoch: 0
  nesterov: false

train_loader_args:
  phase: train
  framerate: 32

test_loader_args:
  phase: test
  framerate: 32

model: models.motion.Motion
model_args:
  pts_size: 96
  num_classes: 25
  knn:
  - 32
  - 24
  - 48
  - 24
  topk: 8
