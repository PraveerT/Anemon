# Exp 6r: Warm-restart from v6p (prediction from scratch, ep135 = 75.52%)
# Tests whether the warm-restart trick that took:
#   nocorr_v4/ep110 (~66%) -> corr_fixed_finetune (79.88%)  [+13.88%]
# also works on:
#   v6p/ep135 (75.52%) -> v6r (?)
#
# Same recipe as corr_fixed_finetune: prediction aux, qcc_w=0.1, 140ep,
# LR 0.0005 -> step 100/120/130. Only difference: starting from 75.52% instead
# of ~66%, so we expect a smaller absolute gain (less headroom) but the
# relative warm-restart effect should still hold.

dataloader: nvidia_dataloader.NvidiaQuaternionQCCParityLoader

phase: train
num_epoch: 140
work_dir: ./work_dir/quaternion_v6p_warmrestart_v6r/
batch_size: 8
test_batch_size: 1
num_worker: 8

device: 0
log_interval: 50
eval_interval: 1
save_interval: 1

framesize: 32
pts_size: 96
dynamic_pts_size: true

weights: ./work_dir/quaternion_prediction_scratch_v6p/epoch135_model.pt
strict_load: false

optimizer_args:
  optimizer: Adam
  base_lr: 0.0005
  step:
  - 100
  - 120
  - 130
  weight_decay: 0.01
  start_epoch: 0
  nesterov: false

train_loader_args:
  phase: train
  framerate: 32
  return_correspondence: true

test_loader_args:
  phase: test
  framerate: 32
  return_correspondence: true

model: models.reqnn_motion.BearingQCCFeatureMotion
model_args:
  pts_size: 96
  num_classes: 25
  hidden_dims:
  - 64
  - 256
  dropout: 0.05
  edgeconv_k: 20
  merge_eps: 1.0e-06
  so3_weight: 0.0
  rotation_sigma: 0.3
  bearing_knn_k: 10
  qcc_weight: 0.1
  qcc_variant: prediction
