# PMamba + Cfbq (10ch fwd+bwd quat Kabsch residual) from scratch.
# Same recipe as base PMamba. Hungarian correspondence (denser than mutual-NN).
# Prior attempt killed at ep102 / 78.42% — 5pp behind base. This run lets it
# go to full 300 ep to see if it catches/surpasses base 89.83.

dataloader: nvidia_dataloader.NvidiaQuaternionQCCParityLoader

phase: train
num_epoch: 300
work_dir: ./work_dir/pmamba_cfbq_scratch/
batch_size: 8
test_batch_size: 1
num_worker: 8

device: 0
log_interval: 50
eval_interval: 1
save_interval: 5

framesize: 32
pts_size: 96

optimizer_args:
  optimizer: Adam
  base_lr: 0.00012
  step:
  - 100
  - 160
  - 180
  weight_decay: 0.03
  start_epoch: 0
  nesterov: false

train_loader_args:
  phase: train
  framerate: 32
  return_correspondence: true
  assignment_mode: hungarian

test_loader_args:
  phase: test
  framerate: 32
  return_correspondence: true
  assignment_mode: hungarian

model: models.motion.MotionRigidResFBQ
model_args:
  pts_size: 96
  num_classes: 25
  knn:
  - 32
  - 24
  - 48
  - 24
  topk: 8
