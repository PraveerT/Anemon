# PMamba + DepthCNNLSTM early fusion. Pretrained backbones loaded; joint MLP
# classifier on concat'd 2048-dim features. 30 epochs, low LR for backbones
# to avoid undoing their pretraining.

dataloader: nvidia_multi_loader.NvidiaMultiLoader

phase: train
num_epoch: 30
work_dir: ./work_dir/pmamba_depth_early_fusion/
batch_size: 8
test_batch_size: 1
num_worker: 8

device: 0
log_interval: 50
eval_interval: 1
save_interval: 5

framesize: 32
pts_size: 96
strict_load: false

optimizer_args:
  optimizer: Adam
  base_lr: 0.0001
  step:
  - 20
  weight_decay: 0.0001
  start_epoch: 0
  nesterov: false

train_loader_args:
  phase: train
  framerate: 32
  img_size: 112
  use_tops: true
  use_rigidity: true
  rigidity_per_point: false
  rigidity_norm_scale: 1.0

test_loader_args:
  phase: test
  framerate: 32
  img_size: 112
  use_tops: true
  use_rigidity: true
  rigidity_per_point: false
  rigidity_norm_scale: 1.0

model: models.motion.PMambaDepthEarlyFusion
model_args:
  num_classes: 25
  pts_size: 256
  knn: [32, 24, 48, 24]
  topk: 8
  depth_in_channels: 4
  depth_feat_dim: 256
  depth_lstm_hidden: 256
  depth_lstm_layers: 2
  depth_bidir: true
  depth_dropout: 0.3
  clip_reweight_beta: 2.0
  pmamba_weights: ./work_dir/pmamba_branch/epoch110_model.pt
  depth_weights: ./work_dir/depth_branch/v9_clean_b2_0/best_model.pt
  freeze_pmamba: false
  freeze_depth: false
  pmamba_feat_dim: 1024
  fusion_hidden: 512
  fusion_dropout: 0.3
