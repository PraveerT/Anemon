# Exp 26a: XYZ + tops field (centroid-radial direction) = 7 channels.
# Family: TopsXYZ_Co_pts48-256_e140.
#
# First layer enlarged to accept 14 input channels (2x7 from EdgeConv graph).
# Rigidity still derived from xyz only. Classifier path unchanged.
#
# Direct test: does explicit tops alongside xyz beat the xyz-only ceiling?
#
# Baselines:
#   v6q  (xyz only):     75.93%
#   v25a (tops only):    64.73%
#   v24a (normals only): 59.96%

dataloader: nvidia_dataloader.NvidiaQuaternionQCCParityLoader

phase: train
num_epoch: 140
work_dir: ./work_dir/quaternion_tops_xyz_v26a/
batch_size: 8
test_batch_size: 1
num_worker: 8

device: 0
log_interval: 50
eval_interval: 1
save_interval: 10

framesize: 32
pts_size: 96
dynamic_pts_size: true

strict_load: false

optimizer_args:
  optimizer: Adam
  base_lr: 0.0005
  step:
  - 100
  - 120
  - 130
  weight_decay: 0.01
  start_epoch: 0
  nesterov: false

train_loader_args:
  phase: train
  framerate: 32
  return_correspondence: true
  assignment_mode: hungarian

test_loader_args:
  phase: test
  framerate: 32
  return_correspondence: true
  assignment_mode: hungarian

model: models.reqnn_motion.TopsXYZInputMotion
model_args:
  pts_size: 96
  num_classes: 25
  hidden_dims:
  - 64
  - 256
  dropout: 0.05
  edgeconv_k: 20
  merge_eps: 1.0e-06
  so3_weight: 0.0
  rotation_sigma: 0.3
  bearing_knn_k: 10
  qcc_weight: 0.0
  qcc_variant: contrastive
