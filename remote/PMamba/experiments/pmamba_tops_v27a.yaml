# Exp 27a: PMamba with tops field (centroid-radial direction) added at stage1.
# Family: PMambaTops_pts48-256_e120.
#
# Mirrors pmamba_branch recipe but replaces model with PMambaTopsMotion.
# Only stage1 sees the 3 extra tops channels; downstream stages use
# xyz+time coords as before (MotionBlock's hardcoded [:, :4] split would
# otherwise break).
#
# Baselines:
#   pmamba_branch (xyz only, ep110): 89.83% test
# v27a prediction: +0 to +1pp (PMamba likely saturated; tops may help at stage1)

dataloader: nvidia_dataloader.NvidiaLoader

phase: train
num_epoch: 120
work_dir: ./work_dir/pmamba_tops_v27a/
batch_size: 8
test_batch_size: 1
num_worker: 8

device: 0
log_interval: 50
eval_interval: 1
save_interval: 5

framesize: 32
pts_size: 96
dynamic_pts_size: true

strict_load: false

optimizer_args:
  optimizer: Adam
  base_lr: 0.00012
  step:
  - 70
  - 90
  - 110
  weight_decay: 0.01
  start_epoch: 0
  nesterov: false

train_loader_args:
  phase: train
  framerate: 32

test_loader_args:
  phase: test
  framerate: 32

model: models.motion.PMambaTopsMotion
model_args:
  num_classes: 25
  pts_size: 96
  knn:
  - 32
  - 24
  - 48
  - 24
  topk: 8
