# Exp 6p: PREDICTION variant from scratch — the missing baseline
# Replicates corr_fixed_finetune's exact recipe but with NO preload.
# Tells us how much of corr_fixed_finetune's 79.88% came from the
# preload vs. the prediction aux loss itself.
#
# Recipe:  qcc_variant=prediction, qcc_weight=0.1, return_correspondence=True
# LR:      0.0005 -> step at 100/120/130
# Epochs:  140
# Same dynamic_pts_size ramp as all other from-scratch baselines

dataloader: nvidia_dataloader.NvidiaQuaternionQCCParityLoader

phase: train
num_epoch: 140
work_dir: ./work_dir/quaternion_prediction_scratch_v6p/
batch_size: 8
test_batch_size: 1
num_worker: 8

device: 0
log_interval: 50
eval_interval: 1
save_interval: 5

framesize: 32
pts_size: 96
dynamic_pts_size: true

# NO `weights` field -> random initialization
strict_load: false

optimizer_args:
  optimizer: Adam
  base_lr: 0.0005
  step:
  - 100
  - 120
  - 130
  weight_decay: 0.01
  start_epoch: 0
  nesterov: false

train_loader_args:
  phase: train
  framerate: 32
  return_correspondence: true

test_loader_args:
  phase: test
  framerate: 32
  return_correspondence: true

model: models.reqnn_motion.BearingQCCFeatureMotion
model_args:
  pts_size: 96
  num_classes: 25
  hidden_dims:
  - 64
  - 256
  dropout: 0.05
  edgeconv_k: 20
  merge_eps: 1.0e-06
  so3_weight: 0.0
  rotation_sigma: 0.3
  bearing_knn_k: 10
  qcc_weight: 0.1
  qcc_variant: prediction
