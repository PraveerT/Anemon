# Exp 6h: From-scratch with TRANSFORMER cycle module (3 segments)
# Phase 1: isolate the architecture upgrade (MLP -> 2-layer transformer)
# from the segment count change. Mirrors quaternion.yaml otherwise.
# Goal: beat or match 80.29% to validate that the deeper architecture helps
# (or at least doesn't hurt) before sweeping num_segments in 6h-6/6h-9.

dataloader: nvidia_dataloader.NvidiaQuaternionQCCParityLoader

phase: train
num_epoch: 140
work_dir: ./work_dir/quaternion_cycle_xfmr_v6h/
batch_size: 8
test_batch_size: 1
num_worker: 8

device: 0
log_interval: 50
eval_interval: 1
save_interval: 5

framesize: 32
pts_size: 96
dynamic_pts_size: true

strict_load: false

optimizer_args:
  optimizer: Adam
  base_lr: 0.0005
  step:
  - 100
  - 120
  - 130
  weight_decay: 0.01
  start_epoch: 0
  nesterov: false

train_loader_args:
  phase: train
  framerate: 32
  return_correspondence: false

test_loader_args:
  phase: test
  framerate: 32
  return_correspondence: false

model: models.reqnn_motion.BearingQCCFeatureMotion
model_args:
  pts_size: 96
  num_classes: 25
  hidden_dims:
  - 64
  - 256
  dropout: 0.05
  edgeconv_k: 20
  merge_eps: 1.0e-06
  so3_weight: 0.0
  rotation_sigma: 0.3
  bearing_knn_k: 10
  qcc_weight: 0.1
  qcc_variant: grounded_cycle
  cycle_module_type: transformer
  num_cycle_segments: 3
  cycle_n_layers: 2
  cycle_n_heads: 4
