# Exp 7b: Stacked aux (prediction + grounded_cycle) at N=24, depth-0
#
# Compact name: Sc_Co_pr01_gc02_N24_e140
#
# Same as v7a (Sc_Co_pr01_gc02_N3_e140 -> 75.93%) except num_cycle_segments
# bumped from 3 to 24.  At 32 frames and N=24, seg_size=1 so the first 23
# segments are 1 frame each and the last segment absorbs frames 23..31.
#
# The cycle constraint becomes a 24-quaternion composition product
# q_{0,1} * q_{1,2} * ... * q_{23,0} = identity, which is much harder to
# satisfy than the 3-segment version.  The grounded_cycle pathway gets a
# stronger structural prior; the prediction pathway is unaffected (it
# iterates over frames, not segments).
#
# Goal: beat the depth-0 from-scratch ceiling (~75-77% cluster).

dataloader: nvidia_dataloader.NvidiaQuaternionQCCParityLoader

phase: train
num_epoch: 140
work_dir: ./work_dir/quaternion_pr01gc02_N24_v7b/
batch_size: 8
test_batch_size: 1
num_worker: 8

device: 0
log_interval: 50
eval_interval: 1
save_interval: 1

framesize: 32
pts_size: 96
dynamic_pts_size: true

# NO `weights` field -> random initialization (from scratch)
strict_load: false

optimizer_args:
  optimizer: Adam
  base_lr: 0.0005
  step:
  - 100
  - 120
  - 130
  weight_decay: 0.01
  start_epoch: 0
  nesterov: false

train_loader_args:
  phase: train
  framerate: 32
  return_correspondence: true

test_loader_args:
  phase: test
  framerate: 32
  return_correspondence: true

model: models.reqnn_motion.BearingQCCFeatureMotion
model_args:
  pts_size: 96
  num_classes: 25
  hidden_dims:
  - 64
  - 256
  dropout: 0.05
  edgeconv_k: 20
  merge_eps: 1.0e-06
  so3_weight: 0.0
  rotation_sigma: 0.3
  bearing_knn_k: 10
  cycle_module_type: mlp
  num_cycle_segments: 24
  qcc_variant:
  - prediction
  - grounded_cycle
  qcc_weight:
  - 0.1
  - 0.2
