# Exp 25a: full architecture with XYZ replaced by centroid-radial direction (tops field).
# Family: TopsInput_Co_pts48-256_e140.
#
# Matches v24a but uses (p - centroid) / |p - centroid| as spatial input
# instead of local surface normals from kNN PCA. Same backbone
# (BearingQCCFeatureMotion, full EdgeConv + quaternion + rigidity + attn).
#
# Compares directly:
#   v24a (true normals, full arch):  59.96%
#   v25a (centroid-radial, full arch): ?
#   v6q  (xyz, full arch):           75.93%

dataloader: nvidia_dataloader.NvidiaQuaternionQCCParityLoader

phase: train
num_epoch: 140
work_dir: ./work_dir/quaternion_tops_input_v25a/
batch_size: 8
test_batch_size: 1
num_worker: 8

device: 0
log_interval: 50
eval_interval: 1
save_interval: 10

framesize: 32
pts_size: 96
dynamic_pts_size: true

strict_load: false

optimizer_args:
  optimizer: Adam
  base_lr: 0.0005
  step:
  - 100
  - 120
  - 130
  weight_decay: 0.01
  start_epoch: 0
  nesterov: false

train_loader_args:
  phase: train
  framerate: 32
  return_correspondence: true
  assignment_mode: hungarian

test_loader_args:
  phase: test
  framerate: 32
  return_correspondence: true
  assignment_mode: hungarian

model: models.reqnn_motion.TopsInputMotion
model_args:
  pts_size: 96
  num_classes: 25
  hidden_dims:
  - 64
  - 256
  dropout: 0.05
  edgeconv_k: 20
  merge_eps: 1.0e-06
  so3_weight: 0.0
  rotation_sigma: 0.3
  bearing_knn_k: 10
  qcc_weight: 0.0
  qcc_variant: contrastive
