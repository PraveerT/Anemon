# Exp 6L: Load the SECOND-BEST checkpoint and apply the original recipe
#
# Tests the "any decent preload + LR-stepped recipe -> ~80%" hypothesis.
# Both quaternion_branch (80.29%) and quaternion_corr_fixed_finetune (79.88%)
# preloaded from the same nocorr_v4/epoch110_model.pt and reached 79-80%.
# The active ingredient appears to be the pretraining + LR schedule, not
# the specific loss variant.
#
# This experiment loads the corr_fixed_finetune ep130 checkpoint (79.88%)
# and applies the EXACT quaternion.yaml recipe to see if we get ~80% again.

dataloader: nvidia_dataloader.NvidiaQuaternionQCCParityLoader

phase: train
num_epoch: 140
work_dir: ./work_dir/quaternion_second_best_v6L/
batch_size: 8
test_batch_size: 1
num_worker: 8

device: 0
log_interval: 50
eval_interval: 1
save_interval: 5

framesize: 32
pts_size: 96
dynamic_pts_size: true

weights: ./work_dir/quaternion_corr_fixed_finetune/epoch130_model.pt
strict_load: false

optimizer_args:
  optimizer: Adam
  base_lr: 0.0005
  step:
  - 100
  - 120
  - 130
  weight_decay: 0.01
  start_epoch: 0
  nesterov: false

train_loader_args:
  phase: train
  framerate: 32
  return_correspondence: false

test_loader_args:
  phase: test
  framerate: 32
  return_correspondence: false

model: models.reqnn_motion.BearingQCCFeatureMotion
model_args:
  pts_size: 96
  num_classes: 25
  hidden_dims:
  - 64
  - 256
  dropout: 0.05
  edgeconv_k: 20
  merge_eps: 1.0e-06
  so3_weight: 0.0
  rotation_sigma: 0.3
  bearing_knn_k: 10
  qcc_weight: 0.1
  qcc_variant: grounded_cycle
  # cycle_module_type defaults to 'mlp' (shallow MLP, the recipe that worked)
