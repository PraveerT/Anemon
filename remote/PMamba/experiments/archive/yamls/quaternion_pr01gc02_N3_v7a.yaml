# Exp 7a: Family 1 depth-0 — stacked aux (prediction + grounded_cycle), N=3
#
# Compact name:
#   Sc_Co_pr01_gc02_N3_e140
#
# Tests whether stacking the grounded-cycle aux loss on top of the prediction
# aux loss (the v6p recipe) gives any lift on the from-scratch baseline.
# Same hyperparameters as v6p except for the stacked qcc_variant / qcc_weight.
#
# Uses shallow mlp cycle module (the original winning variant) at the default
# 3 segments, matching the v6p chain's effective N.
#
# Requires reqnn_motion.py Change A (list-valued qcc_variant/qcc_weight).

dataloader: nvidia_dataloader.NvidiaQuaternionQCCParityLoader

phase: train
num_epoch: 140
work_dir: ./work_dir/quaternion_pr01gc02_N3_v7a/
batch_size: 8
test_batch_size: 1
num_worker: 8

device: 0
log_interval: 50
eval_interval: 1
save_interval: 1

framesize: 32
pts_size: 96
dynamic_pts_size: true

# NO `weights` field -> random initialization (from scratch)
strict_load: false

optimizer_args:
  optimizer: Adam
  base_lr: 0.0005
  step:
  - 100
  - 120
  - 130
  weight_decay: 0.01
  start_epoch: 0
  nesterov: false

train_loader_args:
  phase: train
  framerate: 32
  return_correspondence: true

test_loader_args:
  phase: test
  framerate: 32
  return_correspondence: true

model: models.reqnn_motion.BearingQCCFeatureMotion
model_args:
  pts_size: 96
  num_classes: 25
  hidden_dims:
  - 64
  - 256
  dropout: 0.05
  edgeconv_k: 20
  merge_eps: 1.0e-06
  so3_weight: 0.0
  rotation_sigma: 0.3
  bearing_knn_k: 10
  cycle_module_type: mlp
  num_cycle_segments: 3
  qcc_variant:
  - prediction
  - grounded_cycle
  qcc_weight:
  - 0.1
  - 0.2
