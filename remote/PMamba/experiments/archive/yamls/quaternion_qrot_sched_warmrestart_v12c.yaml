# Exp 12c: Scheduled qr aux — active for exploration, zero for fine-tune
#
# Compact name: P[P[Sc_Co_none_pts48-256_e140]E125_Co_none_pts48-256_e140]E140_Nc_qrS01_pts256_e140
# Family: Sc_Co_none_pts48-256_e140 (same chain as v8a, v12b)
#
# Hypothesis from v10e/v11b/v12b pattern: aux loss helps exploration phase
# (epochs 1-100) but conflicts with classification fine-tune at low LR
# (epochs 100-140). Schedule: qcc_weight=0.1 for 0-99, 0.0 for 100-139.
# This preserves exploration benefit while removing fine-tune conflict.
#
# Token qrS = qr aux with scheduled weight.

dataloader: nvidia_dataloader.NvidiaQuaternionQCCParityLoader
phase: train
num_epoch: 140
work_dir: ./work_dir/quaternion_qrot_sched_warmrestart_v12c/
batch_size: 8
test_batch_size: 1
num_worker: 8
device: 0
log_interval: 50
eval_interval: 1
save_interval: 1
framesize: 32
pts_size: 256
dynamic_pts_size: false
weights: ./work_dir/quaternion_noaux_warmrestart_v8a/epoch140_model.pt
strict_load: false
optimizer_args:
  optimizer: Adam
  base_lr: 0.0005
  step: [100, 120, 130]
  weight_decay: 0.01
  start_epoch: 0
  nesterov: false
train_loader_args:
  phase: train
  framerate: 32
  return_correspondence: false
test_loader_args:
  phase: test
  framerate: 32
  return_correspondence: false
model: models.reqnn_motion.BearingQCCFeatureMotion
model_args:
  pts_size: 256
  num_classes: 25
  hidden_dims: [64, 256]
  dropout: 0.05
  edgeconv_k: 20
  merge_eps: 1.0e-06
  so3_weight: 0.0
  rotation_sigma: 0.3
  bearing_knn_k: 10
  qcc_weight: 0.1
  qcc_variant: bearing_rot
qcc_weight_schedule:
  - [0, 0.1]
  - [100, 0.0]
