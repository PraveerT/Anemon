# Exp 18a: K=6 parts-as-feature (no aux loss beyond tiny entropy reg).
# Family: Sc_Co_parts6feat_pts48-256_e140.
#
# Different from v16a/v17a: the K=6 Procrustes rotations and per-part
# rigidity residuals are used purely as features that multiplicatively
# modulate the encoder output before the classifier. NO reconstruction
# loss, NO cycle-consistency loss. The soft-assignment is learned via the
# classification gradient flowing back through differentiable Procrustes.
# Entropy collapse penalty is the only regularizer (weight ~0.01).
#
# Baselines:
#   v6q (no aux):           75.93%
#   v6p (mutual + pr):      76.14%
#   v15a (hu + pr):         74.07%
#   v16a (hu + rigidity):   73.03%
#   v17a (hu + cycle):      74.69%

dataloader: nvidia_dataloader.NvidiaQuaternionQCCParityLoader

phase: train
num_epoch: 140
work_dir: ./work_dir/quaternion_parts_feature_hungarian_v18a/
batch_size: 8
test_batch_size: 1
num_worker: 8

device: 0
log_interval: 50
eval_interval: 1
save_interval: 5

framesize: 32
pts_size: 96
dynamic_pts_size: true

strict_load: false

optimizer_args:
  optimizer: Adam
  base_lr: 0.0005
  step:
  - 100
  - 120
  - 130
  weight_decay: 0.01
  start_epoch: 0
  nesterov: false

train_loader_args:
  phase: train
  framerate: 32
  return_correspondence: true
  assignment_mode: hungarian

test_loader_args:
  phase: test
  framerate: 32
  return_correspondence: true
  assignment_mode: hungarian

model: models.reqnn_motion.BearingQCCFeatureMotion
model_args:
  pts_size: 96
  num_classes: 25
  hidden_dims:
  - 64
  - 256
  dropout: 0.05
  edgeconv_k: 20
  merge_eps: 1.0e-06
  so3_weight: 0.0
  rotation_sigma: 0.3
  bearing_knn_k: 10
  qcc_weight: 1.0
  qcc_variant: parts_feature
