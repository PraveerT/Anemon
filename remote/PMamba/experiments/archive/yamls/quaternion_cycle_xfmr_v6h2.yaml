# Exp 6h2: Transformer cycle with REDUCED qcc_weight (0.02 instead of 0.1)
# 6h0 confirmed the cycle module's presence is fine; the gradient magnitude
# from the 1.19M-param transformer at qcc_weight=0.1 destabilizes the encoder.
# 0.02 is 5x smaller, roughly matching the MLP version's effective gradient.

dataloader: nvidia_dataloader.NvidiaQuaternionQCCParityLoader

phase: train
num_epoch: 140
work_dir: ./work_dir/quaternion_cycle_xfmr_v6h2/
batch_size: 8
test_batch_size: 1
num_worker: 8

device: 0
log_interval: 50
eval_interval: 1
save_interval: 5

framesize: 32
pts_size: 96
dynamic_pts_size: true

strict_load: false

optimizer_args:
  optimizer: Adam
  base_lr: 0.0005
  step:
  - 100
  - 120
  - 130
  weight_decay: 0.01
  start_epoch: 0
  nesterov: false

train_loader_args:
  phase: train
  framerate: 32
  return_correspondence: false

test_loader_args:
  phase: test
  framerate: 32
  return_correspondence: false

model: models.reqnn_motion.BearingQCCFeatureMotion
model_args:
  pts_size: 96
  num_classes: 25
  hidden_dims:
  - 64
  - 256
  dropout: 0.05
  edgeconv_k: 20
  merge_eps: 1.0e-06
  so3_weight: 0.0
  rotation_sigma: 0.3
  bearing_knn_k: 10
  qcc_weight: 0.02
  qcc_variant: grounded_cycle
  cycle_module_type: transformer
  num_cycle_segments: 3
  cycle_n_layers: 2
  cycle_n_heads: 4
