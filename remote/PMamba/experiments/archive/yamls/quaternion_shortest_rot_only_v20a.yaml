# Exp 20a: shortest-rotation-quaternion-ONLY classifier.
# Family: ShortestRot_Co_pts48-256_e140.
#
# Classifier sees NOTHING except the per-point shortest-rotation quaternion
# field (B, F-1, P, 4). For each Hungarian-paired point pair after centroid
# centering: axis = src_c × tgt_c / |..|, angle = acos(src_c·tgt_c / (|src_c||tgt_c|)),
# quat = (cos(angle/2), sin(angle/2) * axis).
#
# Hypothesis: under rigid motion these per-point quats form a structured
# field that encodes rotation AND each point's position relative to the
# axis. Under articulation, local quats deviate from the global pattern.
# Residual was scalar (and failed); this is a 4-vector per point with
# direction AND magnitude.
#
# Random chance = 4.00%. Solid signal means >>20%.

dataloader: nvidia_dataloader.NvidiaQuaternionQCCParityLoader

phase: train
num_epoch: 140
work_dir: ./work_dir/quaternion_shortest_rot_only_v20a/
batch_size: 8
test_batch_size: 1
num_worker: 8

device: 0
log_interval: 50
eval_interval: 1
save_interval: 10

framesize: 32
pts_size: 96
dynamic_pts_size: true

strict_load: false

optimizer_args:
  optimizer: Adam
  base_lr: 0.0005
  step:
  - 100
  - 120
  - 130
  weight_decay: 0.01
  start_epoch: 0
  nesterov: false

train_loader_args:
  phase: train
  framerate: 32
  return_correspondence: true
  assignment_mode: hungarian

test_loader_args:
  phase: test
  framerate: 32
  return_correspondence: true
  assignment_mode: hungarian

model: models.reqnn_motion.ShortestRotOnlyMotion
model_args:
  num_classes: 25
  pts_size: 96
  hidden: 256
  dropout: 0.1
