# PMamba+tops v2 — clean finetune from PMamba baseline (89.83 ep110).
# Load ep110_nostage1 (stage1 dropped), train 60 ep (80->140), LR schedule
# dropping at 110 and 130. Fresh optimizer so MultiStepLR milestones apply.
# v1 hit 90.66 solo ep119 but via hacky manual LR swap mid-run.

dataloader: nvidia_dataloader.NvidiaLoader

phase: train
num_epoch: 140
work_dir: ./work_dir/pmamba_tops_v2/
batch_size: 8
test_batch_size: 1
num_worker: 8

device: 0
log_interval: 50
eval_interval: 1
save_interval: 5

framesize: 32
pts_size: 256
dynamic_pts_size: false
strict_load: false
weights: ./work_dir/pmamba_branch/epoch110_nostage1.pt

optimizer_args:
  optimizer: Adam
  base_lr: 0.00012
  step:
  - 30
  - 50
  weight_decay: 0.03
  start_epoch: 80
  nesterov: false

train_loader_args:
  phase: train
  framerate: 32

test_loader_args:
  phase: test
  framerate: 32

model: models.motion.MotionTops
model_args:
  num_classes: 25
  pts_size: 256
  knn: [32, 24, 48, 24]
  topk: 8
