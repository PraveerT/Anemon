# Depth CNN-LSTM v2: 4-channel input = depth + tops field (uvd centroid-relative
# unit directions). Same arch as v1, just in_channels=4.

dataloader: depth_branch.dataloader.DepthVideoLoader

phase: train
num_epoch: 140
work_dir: ./work_dir/depth_branch/v2/
batch_size: 16
test_batch_size: 4
num_worker: 8

device: 0
log_interval: 50
eval_interval: 1
save_interval: 10

framesize: 32
pts_size: 112

optimizer_args:
  optimizer: Adam
  base_lr: 0.001
  step:
  - 80
  - 110
  - 130
  weight_decay: 0.0001
  start_epoch: 0
  nesterov: false

train_loader_args:
  phase: train
  framerate: 32
  img_size: 112
  use_tops: true

test_loader_args:
  phase: test
  framerate: 32
  img_size: 112
  use_tops: true
  hflip_prob: 0.0
  time_cutout_prob: 0.0

model: depth_branch.model.DepthCNNLSTM
model_args:
  num_classes: 25
  in_channels: 4
  feat_dim: 256
  lstm_hidden: 256
  lstm_layers: 2
  bidirectional: true
  dropout: 0.3
