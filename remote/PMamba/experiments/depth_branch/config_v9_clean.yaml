# Depth v9-clean: per-clip CE reweight using batch-normalized rigidity std.
# w_i = softplus(β · z_i) normalized to mean 1, capped at 2.0.

dataloader: depth_branch.dataloader.DepthVideoLoader

phase: train
num_epoch: 140
work_dir: ./work_dir/depth_branch/v9_clean/
batch_size: 16
test_batch_size: 4
num_worker: 8

device: 0
log_interval: 50
eval_interval: 1
save_interval: 10

framesize: 32
pts_size: 112

optimizer_args:
  optimizer: Adam
  base_lr: 0.001
  step:
  - 80
  - 110
  - 130
  weight_decay: 0.0001
  start_epoch: 0
  nesterov: false

train_loader_args:
  phase: train
  framerate: 32
  img_size: 112
  use_tops: true
  use_rigidity: true
  rigidity_norm_scale: 1.0

test_loader_args:
  phase: test
  framerate: 32
  img_size: 112
  use_tops: true
  use_rigidity: true
  rigidity_norm_scale: 1.0
  hflip_prob: 0.0
  time_cutout_prob: 0.0

model: depth_branch.model.DepthCNNLSTM
model_args:
  num_classes: 25
  in_channels: 4
  feat_dim: 256
  lstm_hidden: 256
  lstm_layers: 2
  bidirectional: true
  dropout: 0.3
  rigidity_dim: 0
  rigidity_aux_dim: 0
  clip_reweight_beta: 1.0
