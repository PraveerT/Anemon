# Exp 6j: SHALLOW MLP cycle, N=9 segments (Phase 2 — finer temporal split)
# Same architecture as 6i but N=9 instead of N=6.
# At 32 frames / 9 segments ≈ 3-4 frames per segment, this is fine-grained.
# Risk: each segment's pooled feature is noisier; cycle product of 9 quats
# has more compounding error.  Reward: 9 independent constraints vs 3.

dataloader: nvidia_dataloader.NvidiaQuaternionQCCParityLoader

phase: train
num_epoch: 140
work_dir: ./work_dir/quaternion_cycle_n9_v6j/
batch_size: 8
test_batch_size: 1
num_worker: 8

device: 0
log_interval: 50
eval_interval: 1
save_interval: 5

framesize: 32
pts_size: 96
dynamic_pts_size: true

strict_load: false

optimizer_args:
  optimizer: Adam
  base_lr: 0.0005
  step:
  - 100
  - 120
  - 130
  weight_decay: 0.01
  start_epoch: 0
  nesterov: false

train_loader_args:
  phase: train
  framerate: 32
  return_correspondence: false

test_loader_args:
  phase: test
  framerate: 32
  return_correspondence: false

model: models.reqnn_motion.BearingQCCFeatureMotion
model_args:
  pts_size: 96
  num_classes: 25
  hidden_dims:
  - 64
  - 256
  dropout: 0.05
  edgeconv_k: 20
  merge_eps: 1.0e-06
  so3_weight: 0.0
  rotation_sigma: 0.3
  bearing_knn_k: 10
  qcc_weight: 0.1
  qcc_variant: grounded_cycle
  cycle_module_type: deep_mlp
  num_cycle_segments: 9
  cycle_n_hidden_layers: 1
