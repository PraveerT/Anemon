# Exp 26b: warm restart of v26a (xyz + tops, 7-ch) from epoch 130.
# Family: P[TopsXYZ_Co_pts48-256_e140]E130_Co_pts48-256_e140
#
# Reloads v26a checkpoint at ep 130 and starts a FRESH LR schedule
# (lr=5e-4, steps at 100/120/130) for another 140 epochs.
#
# Predictions (2026-04-20, single seed):
#   central:  79.0%   (+1pp over v26a 78.01)
#   range:    78.5 – 79.5
#   best:     80.0
#   worst:    77.5

dataloader: nvidia_dataloader.NvidiaQuaternionQCCParityLoader

phase: train
num_epoch: 140
work_dir: ./work_dir/quaternion_tops_xyz_warmrestart_v26b/
batch_size: 8
test_batch_size: 1
num_worker: 8

device: 0
log_interval: 50
eval_interval: 1
save_interval: 10

framesize: 32
pts_size: 96
dynamic_pts_size: true

# Preload v26a epoch 130, but DON'T use --resume True. That would keep the
# old LR decayed to 5e-7 and re-run epochs 131-140 only. We want a fresh
# 140-epoch schedule from the checkpoint weights.
weights: ./work_dir/quaternion_tops_xyz_v26a/epoch130_model.pt
strict_load: false

optimizer_args:
  optimizer: Adam
  base_lr: 0.0005
  step:
  - 100
  - 120
  - 130
  weight_decay: 0.01
  start_epoch: 0
  nesterov: false

train_loader_args:
  phase: train
  framerate: 32
  return_correspondence: true
  assignment_mode: hungarian

test_loader_args:
  phase: test
  framerate: 32
  return_correspondence: true
  assignment_mode: hungarian

model: models.reqnn_motion.TopsXYZInputMotion
model_args:
  pts_size: 96
  num_classes: 25
  hidden_dims:
  - 64
  - 256
  dropout: 0.05
  edgeconv_k: 20
  merge_eps: 1.0e-06
  so3_weight: 0.0
  rotation_sigma: 0.3
  bearing_knn_k: 10
  qcc_weight: 0.0
  qcc_variant: contrastive
