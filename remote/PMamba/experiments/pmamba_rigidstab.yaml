# Rigid-stabilize: undo whole-hand rigid motion, feed PMamba xyz in frame-0 ref
# Warmstart from pmamba_base ep110 (4-ch interface preserved -> stage1 compatible).
# Hungarian correspondence (denser fits than mutual-NN).
# LR / step matched to Hungarian fine-tune that hit 90.04 with single-fwd residual.

dataloader: nvidia_dataloader.NvidiaQuaternionQCCParityLoader

phase: train
num_epoch: 140
work_dir: ./work_dir/pmamba_rigidstab/
batch_size: 8
test_batch_size: 1
num_worker: 8

device: 0
log_interval: 50
eval_interval: 1
save_interval: 1

framesize: 32
pts_size: 256

weights: ./work_dir/pmamba_branch/epoch110_model.pt
strict_load: false

optimizer_args:
  optimizer: Adam
  base_lr: 0.00012
  step:
  - 20
  weight_decay: 0.03
  start_epoch: 80
  nesterov: false

train_loader_args:
  phase: train
  framerate: 32
  return_correspondence: true
  assignment_mode: hungarian

test_loader_args:
  phase: test
  framerate: 32
  return_correspondence: true
  assignment_mode: hungarian

model: models.motion.MotionRigidStabilize
model_args:
  pts_size: 256
  num_classes: 25
  knn:
  - 32
  - 24
  - 48
  - 24
  topk: 8
