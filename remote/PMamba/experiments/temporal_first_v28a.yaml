# v28a: TemporalFirstMamba — per-point Mamba over time FIRST, then set pool.
# Input: polar (tops + magnitude + time) = 5 channels.
# Arch family: completely different from PMamba (no k-NN spatial ops;
# trajectory-first inductive bias). Goal: maximize oracle complementarity
# with PMamba.
#
# Baselines:
#   PMamba 89.83% (spatial-first k-NN)
#   polar+BearingQCC 75.52% (+2.28pp oracle headroom)
#   velpolar+BearingQCC 79.67% (+1.45pp oracle headroom)

dataloader: nvidia_dataloader.NvidiaQuaternionQCCParityLoader

phase: train
num_epoch: 140
work_dir: ./work_dir/temporal_first_v28a/
batch_size: 8
test_batch_size: 1
num_worker: 8

device: 0
log_interval: 50
eval_interval: 1
save_interval: 10

framesize: 32
pts_size: 96
dynamic_pts_size: true

strict_load: false

optimizer_args:
  optimizer: Adam
  base_lr: 0.0005
  step:
  - 100
  - 120
  - 130
  weight_decay: 0.01
  start_epoch: 0
  nesterov: false

train_loader_args:
  phase: train
  framerate: 32
  return_correspondence: true

test_loader_args:
  phase: test
  framerate: 32
  return_correspondence: true

model: models.motion.TemporalFirstMambaMotion
model_args:
  num_classes: 25
  pts_size: 96
  in_channels: 5
  hidden: 128
  mamba_layers: 2
  dropout: 0.1
