# Exp 9c: Multi-feature rigidity input, from scratch
#
# Compact name: Sc_Nc_rim_pts48-256_e140
# Family: Sc_Nc_rim_pts48-256_e140 (new family)
#
# Uses RigidityMultiInputMotion: 8-channel input
# (x,y,z,intensity, rig_k5, rig_k15, rig_k40, disp_mag).
# No aux loss. Richer geometric prior than single-scalar ri.

dataloader: nvidia_dataloader.NvidiaQuaternionQCCParityLoader

phase: train
num_epoch: 140
work_dir: ./work_dir/quaternion_rim_v9c/
batch_size: 8
test_batch_size: 1
num_worker: 8

device: 0
log_interval: 50
eval_interval: 1
save_interval: 1

framesize: 32
pts_size: 96
dynamic_pts_size: true

strict_load: false

optimizer_args:
  optimizer: Adam
  base_lr: 0.0005
  step:
  - 100
  - 120
  - 130
  weight_decay: 0.01
  start_epoch: 0
  nesterov: false

train_loader_args:
  phase: train
  framerate: 32
  return_correspondence: false

test_loader_args:
  phase: test
  framerate: 32
  return_correspondence: false

model: models.reqnn_rigidity_input.RigidityMultiInputMotion
model_args:
  pts_size: 96
  num_classes: 25
  hidden_dims:
  - 64
  - 256
  dropout: 0.05
  edgeconv_k: 20
  merge_eps: 1.0e-06
  bearing_knn_k: 10
