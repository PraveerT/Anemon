# Warm-restart from pmamba_branch epoch110 weights but tell scheduler start_epoch=80
# 20 epochs at base_lr=0.00012 (epochs 80-99)
# then step at internal-step 20 -> 0.000012 (epochs 100-119)
# total 40 epochs, stop at 120
# Goal: replicate pmamba_base 89.83 exactly with this schedule

dataloader: nvidia_dataloader.NvidiaLoader

phase: train
num_epoch: 120
work_dir: ./work_dir/pmamba_warmrestart_ep80/
batch_size: 8
test_batch_size: 1
num_worker: 8

device: 0
log_interval: 50
eval_interval: 1
save_interval: 5

framesize: 32
pts_size: 256
dynamic_pts_size: false
strict_load: false

weights: ./work_dir/pmamba_branch/epoch110_model.pt

optimizer_args:
  optimizer: Adam
  base_lr: 0.00012
  step:
  - 20
  weight_decay: 0.03
  start_epoch: 80
  nesterov: false

train_loader_args:
  phase: train
  framerate: 32

test_loader_args:
  phase: test
  framerate: 32

model: models.motion.Motion
model_args:
  pts_size: 256
  num_classes: 25
  knn:
  - 32
  - 24
  - 48
  - 24
  topk: 8
