# pmamba_base + per-frame centroid regression aux.
# Centroid-only signal tested at 31.95% standalone (2x quat ceiling) — real
# class info via translation. Same LR recipe that worked for v1 tops.

dataloader: nvidia_dataloader.NvidiaLoader

phase: train
num_epoch: 140
work_dir: ./work_dir/pmamba_centroid/
batch_size: 8
test_batch_size: 1
num_worker: 8

device: 0
log_interval: 50
eval_interval: 1
save_interval: 5

framesize: 32
pts_size: 256
dynamic_pts_size: false
strict_load: false
weights: ./work_dir/pmamba_branch/epoch110_model.pt

optimizer_args:
  optimizer: Adam
  base_lr: 0.00012
  step:
  - 30
  - 50
  weight_decay: 0.03
  start_epoch: 80
  nesterov: false

train_loader_args:
  phase: train
  framerate: 32

test_loader_args:
  phase: test
  framerate: 32

model: models.motion.MotionCentroidAux
model_args:
  num_classes: 25
  pts_size: 256
  knn: [32, 24, 48, 24]
  topk: 8
  centroid_weight: 0.05
