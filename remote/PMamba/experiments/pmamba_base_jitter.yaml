# Resume pmamba_base from ep110 with random pts_size jitter [240, 280] each epoch.
# Goal: reproduce the +2.27pp trick (89.83 -> 92.1) via input-perturbation regularization.
# Vanilla Motion (4-ch xyz+t input, NO Cfbq).

dataloader: nvidia_dataloader.NvidiaLoader

phase: train
num_epoch: 200
work_dir: ./work_dir/pmamba_base_jitter/
batch_size: 8
test_batch_size: 1
num_worker: 8

device: 0
log_interval: 50
eval_interval: 1
save_interval: 1

framesize: 32
pts_size: 256
dynamic_pts_size: true
pts_random_range: [240, 280]      # NEW: random pts each epoch in this range
strict_load: false
weights: ./work_dir/pmamba_branch/epoch110_model.pt

optimizer_args:
  optimizer: Adam
  base_lr: 0.000012
  step:
  - 40
  - 60
  weight_decay: 0.03
  start_epoch: 110
  nesterov: false

train_loader_args:
  phase: train
  framerate: 32

test_loader_args:
  phase: test
  framerate: 32

model: models.motion.Motion
model_args:
  num_classes: 25
  pts_size: 256
  knn: [32, 24, 48, 24]
  topk: 8
