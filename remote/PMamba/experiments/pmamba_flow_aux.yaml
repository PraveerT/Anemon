# PMamba + flow-aux head (paper-inspired). Auxiliary MSE loss on per-frame
# rigidity summary predicted from pre-stage5 per-point features.
# Same schedule as pointlstm.yaml (89.83 baseline); only change: aux loss +
# rigidity loader to provide the target.

dataloader: nvidia_rigidity_loader.NvidiaRigidityLoader

phase: train
num_epoch: 140
work_dir: ./work_dir/pmamba_flow_aux/
batch_size: 8
test_batch_size: 1
num_worker: 8

device: 0
log_interval: 50
eval_interval: 1
save_interval: 5

framesize: 32
pts_size: 96
dynamic_pts_size: true

optimizer_args:
  optimizer: Adam
  base_lr: 0.00012
  step:
  - 100
  - 120
  - 130
  weight_decay: 0.03
  start_epoch: 0
  nesterov: false

train_loader_args:
  phase: train
  framerate: 32
  rigidity_per_point: false
  rigidity_sort: false
  rigidity_norm_scale: 1.0

test_loader_args:
  phase: test
  framerate: 32
  rigidity_per_point: false
  rigidity_sort: false
  rigidity_norm_scale: 1.0

model: models.motion.PMambaFlowAux
model_args:
  num_classes: 25
  pts_size: 96
  knn: [32, 24, 48, 24]
  topk: 8
  flow_aux_weight: 0.1
  flow_aux_dim: 6
  flow_aux_hidden: 64
  flow_feat_channels: 260
