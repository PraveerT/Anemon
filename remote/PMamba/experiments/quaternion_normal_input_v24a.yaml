# Exp 24a: full BearingQCCFeatureMotion architecture with XYZ replaced by normals.
# Family: NormalInput_Co_pts48-256_e140.
#
# EdgeConv + quaternion mixer + rigidity modulation + attention readout,
# but first 3 input channels are local surface normals (PCA on k=10 kNN),
# not xyz. Isolates whether the normal field carries signal when given
# the full architecture's capacity.
#
# Baselines:
#   v6q (xyz, no aux):      75.93%
#   v22a (normal-only, simple conv): 4.56% (random) -- architecture-limited
# v24a: ?

dataloader: nvidia_dataloader.NvidiaQuaternionQCCParityLoader

phase: train
num_epoch: 140
work_dir: ./work_dir/quaternion_normal_input_v24a/
batch_size: 8
test_batch_size: 1
num_worker: 8

device: 0
log_interval: 50
eval_interval: 1
save_interval: 10

framesize: 32
pts_size: 96
dynamic_pts_size: true

strict_load: false

optimizer_args:
  optimizer: Adam
  base_lr: 0.0005
  step:
  - 100
  - 120
  - 130
  weight_decay: 0.01
  start_epoch: 0
  nesterov: false

train_loader_args:
  phase: train
  framerate: 32
  return_correspondence: true
  assignment_mode: hungarian

test_loader_args:
  phase: test
  framerate: 32
  return_correspondence: true
  assignment_mode: hungarian

model: models.reqnn_motion.NormalInputMotion
model_args:
  pts_size: 96
  num_classes: 25
  hidden_dims:
  - 64
  - 256
  dropout: 0.05
  edgeconv_k: 20
  merge_eps: 1.0e-06
  so3_weight: 0.0
  rotation_sigma: 0.3
  bearing_knn_k: 10
  qcc_weight: 0.0
  qcc_variant: contrastive
  knn_k_normal: 10
