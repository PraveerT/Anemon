# PMamba + Cfbq (fwd+bwd quaternion Kabsch residual) from SCRATCH.
# Matches pmamba_tops_scratch recipe exactly (base scratch training):
# 300 ep, dynamic pts 48->256 over ep 0-100, Adam 1.2e-4, step [100,160,180],
# wd 0.03, bs 8. Only diff: MotionRigidResFBQ (10-ch Cfbq) vs MotionTops (7-ch).
# Direct from-scratch comparison vs pmamba_base 89.83 / pmamba_tops.

dataloader: nvidia_dataloader.NvidiaQuaternionQCCParityLoader

phase: train
num_epoch: 300
work_dir: ./work_dir/pmamba_qcc_scratch/
batch_size: 8
test_batch_size: 1
num_worker: 8

device: 0
log_interval: 50
eval_interval: 1
save_interval: 1

framesize: 32
pts_size: 96
dynamic_pts_size: true

optimizer_args:
  optimizer: Adam
  base_lr: 0.00012
  step:
  - 100
  - 160
  - 180
  weight_decay: 0.03
  start_epoch: 0
  nesterov: false

train_loader_args:
  phase: train
  framerate: 32
  return_correspondence: true

test_loader_args:
  phase: test
  framerate: 32
  return_correspondence: true

model: models.motion.MotionRigidResFBQ
model_args:
  num_classes: 25
  pts_size: 96
  knn: [32, 24, 48, 24]
  topk: 8
