# pmamba_base + contrastive aux with proper Hungarian correspondence.
# Load best pmamba_base (ep110, 89.83%). Same schedule as pmamba_base.
# Aux: InfoNCE on fea1, per-point residual from correspondence-aligned Kabsch.

dataloader: nvidia_dataloader.NvidiaQuaternionQCCParityLoader

phase: train
num_epoch: 300
work_dir: ./work_dir/pmamba_contrastive_corr/
batch_size: 8
test_batch_size: 1
num_worker: 8

device: 0
log_interval: 50
eval_interval: 1
save_interval: 5

framesize: 32
pts_size: 256
dynamic_pts_size: false
strict_load: false
weights: ./work_dir/pmamba_contrastive_corr/epoch100_model.pt

optimizer_args:
  optimizer: Adam
  base_lr: 0.000012
  step:
  - 60
  - 80
  weight_decay: 0.03
  start_epoch: 100
  nesterov: false

train_loader_args:
  phase: train
  framerate: 32
  return_correspondence: true

test_loader_args:
  phase: test
  framerate: 32
  return_correspondence: true

model: models.motion.MotionRigidityContrastiveCorr
model_args:
  num_classes: 25
  pts_size: 256
  knn: [32, 24, 48, 24]
  topk: 8
  contrast_weight: 0.05
  contrast_temp: 0.1
  contrast_num_anchors: 16
