# choose dataset
dataloader: nvidia_dataloader.NvidiaLoader

# dataloader: shrec_dataloader.SHRECLoader

# train or test
phase: train
num_epoch: 300
work_dir: ./work_dir/baseline/
batch_size: 8
test_batch_size: 1
num_worker: 8

# empty for cpu
device: 1
log_interval: 50
eval_interval: 1
save_interval: 5
# weights: ./work_dir/pointlstm/epoch200_model.pt

framesize: &framesize 32
pts_size: &frame_pts_size 96  # Will increase dynamically: 96->128 (epochs 0-50), 128->256 (epochs 50-100)

optimizer_args:
  optimizer: Adam
  base_lr: 0.00012
  step: [ 100, 160, 180]
  weight_decay: 0.03
  start_epoch: 0
  nesterov: False

train_loader_args:
  phase: 'train'
  framerate:  *framesize

#valid_loader_args:
#  phase: 'valid'
#  framerate: *framesize

test_loader_args:
  phase: 'test'
  framerate: *framesize


model: models.motion.Motion
model_args:
  pts_size: *frame_pts_size
  num_classes: 25
  knn: [32, 24, 48, 24]
  topk: 8
