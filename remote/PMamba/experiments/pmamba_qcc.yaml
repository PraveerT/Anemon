# pmamba_base + Mittal-anchored QCC aux.
# Load best pmamba_base (ep110, 89.83). Same LR recipe that worked for v1 tops:
# start_epoch 80 → train to 140, LR 0.00012 drops at ep110 (step 30) and ep130 (step 50).
# Aux: pair-quaternion head + anchor to Kabsch q_obs + transitivity.

dataloader: nvidia_dataloader.NvidiaQuaternionQCCParityLoader

phase: train
num_epoch: 140
work_dir: ./work_dir/pmamba_qcc/
batch_size: 8
test_batch_size: 1
num_worker: 8

device: 0
log_interval: 50
eval_interval: 1
save_interval: 5

framesize: 32
pts_size: 256
dynamic_pts_size: false
strict_load: false
weights: ./work_dir/pmamba_branch/epoch110_model.pt

optimizer_args:
  optimizer: Adam
  base_lr: 0.00012
  step:
  - 30
  - 50
  weight_decay: 0.03
  start_epoch: 80
  nesterov: false

train_loader_args:
  phase: train
  framerate: 32
  return_correspondence: true

test_loader_args:
  phase: test
  framerate: 32
  return_correspondence: true

model: models.motion.MotionQCCAnchored
model_args:
  num_classes: 25
  pts_size: 256
  knn: [32, 24, 48, 24]
  topk: 8
  qcc_weight: 0.05
  anchor_weight: 1.0
  trans_weight: 0.5
