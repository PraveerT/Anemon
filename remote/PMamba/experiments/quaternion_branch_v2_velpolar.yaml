# quaternion_branch_v2_velpolar: BearingQCCFeatureMotion with velocity + polar input.
# 8-channel input: [vx, vy, vz, tops_x, tops_y, tops_z, |p-centroid|, time]
# Velocity via forward-diff on correspondence-aligned points.
# Rigidity: still computed from real xyz (unchanged).
#
# Recipe matches quaternion_branch (qcc=0.1 contrastive, 140 ep, LR [100,120,130]).
# Goal: higher oracle complementarity with PMamba than polar's +2.28pp.

dataloader: nvidia_dataloader.NvidiaQuaternionQCCParityLoader

phase: train
num_epoch: 140
work_dir: ./work_dir/quaternion_branch_v2_velpolar/
batch_size: 8
test_batch_size: 1
num_worker: 8

device: 0
log_interval: 50
eval_interval: 1
save_interval: 10

framesize: 32
pts_size: 96
dynamic_pts_size: true

strict_load: false

optimizer_args:
  optimizer: Adam
  base_lr: 0.0005
  step:
  - 100
  - 120
  - 130
  weight_decay: 0.01
  start_epoch: 0
  nesterov: false

train_loader_args:
  phase: train
  framerate: 32
  return_correspondence: true

test_loader_args:
  phase: test
  framerate: 32
  return_correspondence: true

model: models.reqnn_motion.VelocityPolarBearingQCCFeatureMotion
model_args:
  pts_size: 96
  num_classes: 25
  hidden_dims:
  - 64
  - 256
  dropout: 0.05
  edgeconv_k: 20
  merge_eps: 1.0e-06
  so3_weight: 0.0
  rotation_sigma: 0.3
  bearing_knn_k: 10
  qcc_weight: 0.1
  qcc_variant: contrastive
