# CN-XXL + quat-head trained on the baked canonical dataset.
# Replaces the standard NvidiaLoader with CanonicalNvidiaLoader -- each
# sample is the frozen AE's K=512 canonical ordered point cloud, so
# correspondence is ground-truth in the input. The classifier is unchanged
# from the 91.08 winner; only the data pipeline differs.

dataloader: canonical_nvidia_loader.CanonicalNvidiaLoader
phase: train
num_epoch: 100
work_dir: ./work_dir/cn_xxl_canonical/
batch_size: 8
test_batch_size: 8
num_worker: 8
device: 0
log_interval: 50
eval_interval: 1
save_interval: 5

framesize: 32
pts_size: 172
dynamic_pts_size: true
strict_load: false
weights: ./work_dir/cn_xxl_quat_head/epoch75_model.pt

optimizer_args:
  scheduler: constant_then_cosine
  cosine_start: 75
  num_epochs: 100
  optimizer: Adam
  base_lr: 0.00012
  step: [60, 70, 75]
  weight_decay: 0.03
  start_epoch: 75
  nesterov: false

train_loader_args: {phase: train, framerate: 32}
test_loader_args:  {phase: test,  framerate: 32}

model: models.motion_cleanest_quat_head.MotionCleanestLinXLQuatHead
model_args:
  pts_size: 172
  num_classes: 25
  knn: [32, 24, 48, 24]
  topk: 8
  multi_scale_num_scales: 5
  lxl_hidden_dim: 256
  lxl_mlp_dim: 512
  lxl_num_layers: 4
  lxl_dropout: 0.3
  lxl_bidirectional: true
  lxl_residual_scale: 0.7
