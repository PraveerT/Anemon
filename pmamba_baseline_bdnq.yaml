# Buffered DeltaNet on NVGesture — same network structure as
# pmamba_baseline_realdeltanet.yaml but with BD-N (Buffered DeltaNet) replacing
# the RealDeltaNet temporal encoder.
#
# BD-N's win on MQAR (7/7 cells significantly beat plain DeltaNet, p<0.001 to
# p<0.01) was driven by a short attention KV-buffer (FIFO) plus a long-term
# delta state. Buffer size set to 4 here since T_encoded is small after PMamba
# pooling (typically T=4 after multi-scale downsampling).

dataloader: nvidia_dataloader.NvidiaLoader
phase: train
num_epoch: 120
work_dir: ./work_dir/pmamba_baseline_bdnq/
batch_size: 8
test_batch_size: 1
num_worker: 8
device: 0
log_interval: 50
eval_interval: 1
save_interval: 5

framesize: 32
pts_size: 96
dynamic_pts_size: true
strict_load: false
weights: null

optimizer_args:
  optimizer: Adam
  base_lr: 0.00012
  step: [100, 160, 180]
  weight_decay: 0.03
  start_epoch: 0
  nesterov: false

train_loader_args: {phase: train, framerate: 32}
test_loader_args:  {phase: test,  framerate: 32}

model: models.motion_bdn_q.MotionBDeltaQ
model_args:
  pts_size: 96
  num_classes: 25
  knn: [32, 24, 48, 24]
  topk: 8
  multi_scale_num_scales: 5
  bdnq_hidden_dim: 128
  bdnq_num_layers: 2
  bdnq_num_heads: 4
  bdnq_n_q: 4
  bdnq_n_v: 8
  bdnq_buffer_size: 1
  bdnq_dropout: 0.3
  bdnq_bidirectional: true
