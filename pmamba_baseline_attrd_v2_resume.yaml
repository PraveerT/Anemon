# Resume AttRD-v2 from ep75 ckpt (saved before notebook reboot).

dataloader: nvidia_dataloader.NvidiaLoader
phase: train
num_epoch: 120
work_dir: ./work_dir/pmamba_baseline_attrd_v2/
batch_size: 8
test_batch_size: 1
num_worker: 8
device: 0
log_interval: 50
eval_interval: 1
save_interval: 5

framesize: 32
pts_size: 96
dynamic_pts_size: true
strict_load: false
weights: ./work_dir/pmamba_baseline_attrd_v2/epoch75_model.pt
resume: true

optimizer_args:
  optimizer: Adam
  base_lr: 0.00012
  step: [100, 160, 180]
  weight_decay: 0.03
  start_epoch: 0
  nesterov: false

train_loader_args: {phase: train, framerate: 32}
test_loader_args:  {phase: test,  framerate: 32}

model: models.motion_attrd_v2.MotionAttRDv2
model_args:
  pts_size: 96
  num_classes: 25
  knn: [32, 24, 48, 24]
  topk: 8
  multi_scale_num_scales: 5
  av2_hidden_dim: 128
  av2_num_layers: 2
  av2_num_heads: 4
  av2_n_q: 4
  av2_n_v: 8
  av2_d_read: 64
  av2_dropout: 0.3
  av2_bidirectional: true
