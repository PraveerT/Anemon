# CN-XXL + Future Feature Prediction, resume from CN-XXL ep60.
# 60 more epochs of fine-tune with aux loss (run to ep 120).
# More headroom than ep100 resume — network still has room to adapt to aux supervision.

dataloader: nvidia_dataloader.NvidiaLoader
phase: train
num_epoch: 120
work_dir: ./work_dir/pmamba_baseline_cn_xxl_futurefeat_ep60/
batch_size: 8
test_batch_size: 1
num_worker: 8
device: 0
log_interval: 50
eval_interval: 1
save_interval: 5

framesize: 32
pts_size: 96
dynamic_pts_size: true
strict_load: false
weights: ./work_dir/pmamba_baseline_cn_xxl_futurefeat_ep60/epoch100_model.pt

optimizer_args:
  optimizer: Adam
  base_lr: 0.000012   # post-ep100 dropped value
  step: [200]         # no further milestone fires in remaining 20 epochs
  weight_decay: 0.03
  start_epoch: 100
  nesterov: false

train_loader_args: {phase: train, framerate: 32}
test_loader_args:  {phase: test,  framerate: 32}

model: models.motion_cleanest_futurefeat.MotionCleanestLinXLFutureFeat
model_args:
  pts_size: 96
  num_classes: 25
  knn: [32, 24, 48, 24]
  topk: 8
  multi_scale_num_scales: 5
  lxl_hidden_dim: 256
  lxl_mlp_dim: 512
  lxl_num_layers: 4
  lxl_dropout: 0.3
  lxl_bidirectional: true
  lxl_residual_scale: 0.7
  future_embed_dim: 128
  future_weight: 0.1
  future_horizons: [1, 2, 4]
