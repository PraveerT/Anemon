# N2 (depth) + Lattice K=8 top-256 (side) with state-coupled temporal Mamba.
# Inter-modal hidden state coupling at each step (Coupled Mamba design).

phase: train
num_epoch: 120
work_dir: ./work_dir/pmamba_dtw_coupled/
batch_size: 8
test_batch_size: 1
num_worker: 8
device: 0
log_interval: 50
eval_interval: 1
save_interval: 5

framesize: 32
pts_size: 96
dynamic_pts_size: true
strict_load: false
weights: null

optimizer_args:
  optimizer: Adam
  base_lr: 0.00012
  step: [100, 160, 180]
  weight_decay: 0.03
  start_epoch: 0
  nesterov: false

train_loader_args: {phase: train, framerate: 32}
test_loader_args:  {phase: test,  framerate: 32}

dataloader: nvidia_dataloader.NvidiaDTWLatticeK8Top256Loader
model: models.motion_coupled.MotionCoupled
model_args:
  pts_size: 96
  num_classes: 25
  knn: [32, 24, 48, 24]
  topk: 8
  multi_scale_num_scales: 5
  lattice_n: 256
  lattice_hidden: 192
  lattice_layers: 4
  coupled_hidden: 256
  aux_weight: 1.0
  lattice_init_weights: null
